<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic List Creator</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="main.js"></script>
</head>
<body>
    <div class="box">
        <div class="top-row">
            <h1>Dynamic List</h1>
            <button id="theme-btn">☀️</button>
        </div>
        <div class="input-row">
            <input type="text" id="list-input" placeholder="Type an item..." />
            <button id="add-btn">Add</button>
        </div>
        <ul id="list"></ul>
    </div>
</body>
</html>
