<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery Explorer</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="main.js"></script>
</head>
<body>
    <main class="page">
        <section class="headline">
            <p class="eyebrow">DOM Project 05</p>
            <h1>Image Gallery Explorer</h1>
            <p>
                Pull a fresh set of images from Picsum, filter by author name,
                and open a larger preview without leaving the page.
            </p>
        </section>

        <section class="gallery-shell">
            <div class="controls">
                <label class="control">
                    <span>Load</span>
                    <select id="count-select">
                        <option value="8">8 images</option>
                        <option value="12" selected>12 images</option>
                        <option value="16">16 images</option>
                    </select>
                </label>

                <label class="control search-control">
                    <span>Filter author</span>
                    <input id="search-input" type="search" placeholder="Type a name...">
                </label>

                <div class="layout-switch" aria-label="Layout selector">
                    <button class="layout-btn is-active" type="button" data-layout="grid">Grid</button>
                    <button class="layout-btn" type="button" data-layout="masonry">Masonry</button>
                </div>

                <button id="shuffle-btn" class="shuffle-btn" type="button">Load New Batch</button>
            </div>

            <p id="gallery-status" class="status" role="status" aria-live="polite">Ready to load images.</p>
            <section id="gallery" class="gallery gallery-grid" aria-live="polite"></section>
        </section>
    </main>

    <div id="modal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-close="true"></div>
        <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <button id="close-modal" class="close-modal" type="button" aria-label="Close preview">×</button>
            <img id="modal-image" alt="">
            <div class="modal-copy">
                <p class="modal-label">Selected Photo</p>
                <h2 id="modal-title"></h2>
                <a id="modal-link" href="#" target="_blank" rel="noreferrer">Open original image</a>
            </div>
        </article>
    </div>
</body>
</html>
